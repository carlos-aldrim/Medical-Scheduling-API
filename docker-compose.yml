services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: medical_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://admin:secret@db:5432/medical_scheduling?serverVersion=16&charset=utf8"
      DEFAULT_URI: "http://localhost:9000"
    networks:
      - medical_network

  nginx:
    image: nginx:alpine
    container_name: medical_nginx
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - medical_network

  db:
    image: postgres:16-alpine
    container_name: medical_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medical_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medical_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - medical_network

volumes:
  pgdata:

networks:
  medical_network:
    driver: bridge
